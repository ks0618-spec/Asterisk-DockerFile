[general]
rtpstart=10000      ; ← Python RX port (Asterisk sends TO here)
rtpend=10120        ; ← Python TX port (Asterisk receives FROM here)  
icesupport=no      ; ← DISABLE (breaks static ExternalMedia ports)
stunaddr=          ; ← DISABLE (local testing only)  
strictrtp=no       ; ← DISABLE (allows Python RTP during debug)
rtcpinterval=0     ; ← DISABLE RTCP temporarily

