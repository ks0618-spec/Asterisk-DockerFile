[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=192.168.1.205
external_signaling_address=192.168.1.205
local_net=192.168.1.0/24

; AUTH SECTIONS
[1001-auth]
type=auth
auth_type=userpass
username=1001
password=pass123
realm=*

[1002-auth] 
type=auth
auth_type=userpass
username=1002
password=pass123
realm=*

[1003-auth] 
type=auth
auth_type=userpass
username=1003
password=pass123
realm=*

[provider-auth]
type=auth
auth_type=userpass
username=YOUR_USERNAME
password=YOUR_PASSWORD

; AOR SECTIONS
[1001]
type=aor
max_contacts=10

[1002]
type=aor
max_contacts=10

[1003]
type=aor
max_contacts=10

[provider-aor]
type=aor
contact=sip:PROVIDER_IP   ; or domain

; ENDPOINT SECTIONS
[1001]
type=endpoint
transport=transport-udp
context=ai-inbound
disallow=all
allow=slin16,ulaw,alaw,g722
auth=1001-auth
aors=1001
rtp_symmetric=yes
force_rport=yes
direct_media=no
ice_support=yes

[1002]
type=endpoint
transport=transport-udp
context=ai-inbound
disallow=all
allow=ulaw
auth=1002-auth
aors=1002
rtp_symmetric=yes
force_rport=yes
direct_media=no
rewrite_contact=yes                    ; 🔥 MUST
media_use_received_transport=yes       ; 🔥 MUST
ice_support=no                         ; 🔥 MUST
rtp_keepalive=1                        ; 🔥 VERY IMPORTANT
force_rport=yes

[1003]
type=endpoint
transport=transport-udp
context=ai-inbound
disallow=all
allow=slin16,ulaw,alaw,g722
auth=1003-auth
aors=1003
rtp_symmetric=yes
force_rport=yes
direct_media=no
ice_support=yes

[provider-endpoint]
type=endpoint
transport=transport-udp
context=ai-inbound
disallow=all
allow=ulaw,alaw
outbound_auth=provider-auth
aors=provider-aor

[provider-identify]
type=identify
endpoint=provider-endpoint
match=PROVIDER_IP
